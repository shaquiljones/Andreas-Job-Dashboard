<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andrea's Career Dashboard | Excellence & Cosmetology</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #001F3F; /* Deep Navy Blue */
            --accent: #D4AF37; /* Gold */
            --bg: #F0F4F8;
            --text: #1A1A1A;
            --card-bg: #FFFFFF;
        }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 0; }
        header { background: linear-gradient(135deg, var(--primary) 0%, #000814 100%); color: white; padding: 40px 20px; text-align: center; position: relative; overflow: hidden; }
        header img.hero-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.2; z-index: 0; }
        .header-content { position: relative; z-index: 1; display: flex; align-items: center; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .profile-pic { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--accent); object-fit: cover; }
        h1 { font-family: 'Playfair Display', serif; color: var(--accent); margin: 0; font-size: 2.5rem; }
        .subtitle { margin-top: 10px; font-style: italic; font-weight: 300; }
        .controls { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; padding: 30px 20px; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .category-btn { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .category-btn:hover, .active { background: var(--accent); color: var(--primary); }
        .alert-section { width: 100%; text-align: center; margin-top: 10px; }
        .switch { position: relative; display: inline-block; width: 50px; height: 24px; vertical-align: middle; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .job-card { background: var(--card-bg); margin-bottom: 20px; border-radius: 12px; padding: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 5px solid var(--accent); transition: 0.3s; }
        .job-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .job-card h3 { margin: 0 0 10px 0; color: var(--primary); font-size: 1.4rem; }
        .job-meta { display: flex; justify-content: space-between; font-size: 0.9rem; color: #666; margin-bottom: 15px; flex-wrap: wrap; gap: 5px; }
        .job-tags span { background: #EEE; padding: 4px 10px; border-radius: 12px; font-size: 0.8rem; margin-right: 5px; }
        .why-fit { background: #F9F7F3; padding: 15px; border-radius: 8px; margin: 15px 0; font-style: italic; border-left: 3px solid var(--primary); }
        .actions { display: flex; gap: 15px; margin-top: 15px; flex-wrap: wrap; }
        .btn { text-decoration: none; padding: 10px 20px; border-radius: 6px; font-weight: 600; font-size: 0.9rem; cursor: pointer; border: none; }
        .btn-apply { background: var(--primary); color: white; }
        .btn-cover { background: white; color: var(--primary); border: 1px solid var(--primary); }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 600px; position: relative; }
        .close { position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; color: #666; }
        .cover-letter-text { white-space: pre-wrap; background: #f9f9f9; padding: 20px; border-radius: 8px; font-family: 'Poppins', sans-serif; line-height: 1.6; }
        .copy-btn { margin-top: 15px; background: var(--accent); color: var(--primary); }
        .loading { text-align: center; color: var(--primary); font-size: 1.2rem; margin-top: 50px; }
    </style>
</head>
<body>

<header>
    <img src="https://z-cdn-media.chatglm.cn/files/00b69df5-8bc9-45bd-808b-e97e3bbb25fb.jpeg?auth_key=1882319334-22bb745a8bfd49b0af5acf126ac1fe61-0-9fe29ebcb358618cab1ccb9e0011f3fc" class="hero-bg" alt="Graduation">
    <div class="header-content">
        <img src="https://z-cdn-media.chatglm.cn/files/b050221b-404d-45ab-94ed-a2d9229d2401.jpeg?auth_key=1882319334-afbe1ff920134896bde96c7fcc63be1c-0-b5a84fedfc51a4ac8cfa7b3928978b94" class="profile-pic" alt="Andrea">
        <div>
            <h1>Andrea Morris-Brown</h1>
            <div class="subtitle">Black. Mom. Excellence. | Live Job Dashboard</div>
        </div>
    </div>
</header>

<div class="controls">
    <button class="category-btn active" onclick="searchJobs('all', this)">All Leads</button>
    <button class="category-btn" onclick="searchJobs('cosmetology', this)">Cosmetology</button>
    <button class="category-btn" onclick="searchJobs('customer-service', this)">Customer Service</button>
    <button class="category-btn" onclick="searchJobs('healthcare', this)">Healthcare Support</button>
    <button class="category-btn" onclick="searchJobs('events', this)">Gallery & Events</button>
    
    <div class="alert-section">
        <label style="display: inline-flex; align-items: center; gap: 10px; font-weight: 600; color: var(--primary);">
            <span>Enable Daily Email Alerts</span>
            <label class="switch">
                <input type="checkbox" id="alertToggle" onchange="toggleAlerts()">
                <span class="slider"></span>
            </label>
        </label>
    </div>
</div>

<div class="container" id="jobBoard">
    <div class="loading">Searching for the latest opportunities near East Orange, NJ...</div>
</div>

<div id="coverLetterModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2 style="color: var(--primary); font-family: 'Playfair Display';">Generated Cover Letter</h2>
        <div id="coverLetterBody" class="cover-letter-text"></div>
        <button class="btn copy-btn" onclick="copyLetter()">Copy to Clipboard</button>
    </div>
</div>

<script>
    // --- PASTE YOUR ADZUNA KEYS HERE ---
    const ADZUNA_APP_ID = 'faf2922c';
    const ADZUNA_APP_KEY = '7d10dc2ac7d053d877b9790b7b83ebd4';
    // ------------------------------------

    const ANDREA_EMAIL = "andream.b.101@gmail.com";
    
    // Resume templates for dynamic generation
    const resumeContext = {
        cosmetology: "As a recent graduate of South Florida State College’s Cosmetology program with a 4.0 GPA and 1,200 contact hours, I have honed my skills in precision cutting, chemical reformation, and color theory. My background in customer service ensures that I can build and maintain a loyal client base while delivering exceptional salon experiences.",
        'customer-service': "Currently, I serve as a CSR for CVS Health where I assist healthcare members with medical orders, benefit enrollment, and account management. My ability to navigate complex systems and resolve inquiries efficiently makes me a strong candidate. I am highly accustomed to remote work environments and committed to delivering empathetic, top-tier service.",
        healthcare: "With direct experience as a caregiver supporting elderly residents and my current role assisting CVS Health members, I possess a deep understanding of both patient empathy and healthcare administration. I am passionate about maintaining a safe, supportive environment and helping patients navigate their care seamlessly.",
        events: "Previously, I served as a Student Life Coordinator at the South Florida State College MOFAC Gallery, where I managed art exhibits, organized warehouse displays, and built strong client relationships for public and private events. I am confident that my background in gallery management and community engagement makes me an excellent fit."
    };

    const searchQueries = {
        'cosmetology': 'cosmetology hair stylist nail technician',
        'customer-service': 'customer service representative remote',
        'healthcare': 'patient care caregiver healthcare',
        'events': 'event coordinator gallery assistant'
    };

    let currentCategory = 'all';

    async function searchJobs(category, btn) {
        if (btn) {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        currentCategory = category;
        const board = document.getElementById('jobBoard');
        board.innerHTML = '<div class="loading">Fetching fresh job leads...</div>';

        let categoriesToSearch = category === 'all' ? Object.keys(searchQueries) : [category];
        let allJobs = [];

        for (let cat of categoriesToSearch) {
            const query = searchQueries[cat];
            const url = `https://api.adzuna.com/v1/api/jobs/us/search/1?app_id=${ADZUNA_APP_ID}&app_key=${ADZUNA_APP_KEY}&what=${query}&where=East+Orange%2C+NJ&distance=20&results_per_page=8&sort_by=date`;
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                if (data.results) {
                    data.results.forEach(job => {
                        allJobs.push({
                            title: job.title,
                            company: job.company.display_name,
                            location: job.location.display_name,
                            url: job.redirect_url,
                            description: job.description.substring(0, 250) + '...',
                            category: cat
                        });
                    });
                }
            } catch (error) {
                console.error("Error fetching jobs for " + cat, error);
            }
        }

        renderJobs(allJobs);
    }

    function renderJobs(jobs) {
        const board = document.getElementById('jobBoard');
        board.innerHTML = '';
        
        if (jobs.length === 0) {
            board.innerHTML = '<p style="text-align: center; color: var(--primary); font-size: 1.2rem;">No new jobs found today. Check back tomorrow!</p>';
            return;
        }

        jobs.forEach(job => {
            const card = document.createElement('div');
            card.className = 'job-card';
            card.innerHTML = `
                <h3>${job.title}</h3>
                <div class="job-meta">
                    <span><strong>${job.company}</strong></span>
                    <span>📍 ${job.location}</span>
                </div>
                <div class="job-tags">
                    <span>${job.category.replace('-', ' ')}</span>
                </div>
                <p style="font-size: 0.9rem; color: #444;">${job.description}</p>
                <div class="why-fit">
                    <strong>Why Andrea is a perfect fit:</strong><br>
                    ${resumeContext[job.category]}
                </div>
                <div class="actions">
                    <a href="${job.url}" target="_blank" class="btn btn-apply">Apply Here</a>
                    <button class="btn btn-cover" onclick='generateCoverLetter(${JSON.stringify(job).replace(/'/g, "\\'")})'>Generate Cover Letter</button>
                </div>
            `;
            board.appendChild(card);
        });
    }

    function generateCoverLetter(job) {
        const letter = `Dear Hiring Manager,\n\nI am writing to express my interest in the ${job.title} position at ${job.company}. ${resumeContext[job.category]} I am eager to bring my dedication and professional excellence to your team.\n\nThank you for your time and consideration. I look forward to the possibility of discussing this opportunity with you.\n\nSincerely,\nAndrea Morris-Brown\n(908) 425-0028\n${ANDREA_EMAIL}`;
        
        document.getElementById('coverLetterBody').textContent = letter;
        document.getElementById('coverLetterModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('coverLetterModal').style.display = 'none'; }

    function copyLetter() {
        const text = document.getElementById('coverLetterBody').textContent;
        navigator.clipboard.writeText(text).then(() => { alert('Cover letter copied to clipboard!'); });
    }

    function toggleAlerts() {
        const isOn = document.getElementById('alertToggle').checked;
        if(isOn) {
            alert('Daily alerts enabled! The GitHub Action will email you new jobs every morning at 8:00 AM EST.');
        } else {
            alert('Alerts disabled.');
        }
    }

    // Load jobs immediately when the page opens
    searchJobs('all', document.querySelector('.category-btn'));
</script>

</body>
</html>
